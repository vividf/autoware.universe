name: cppcheck-differential

on:
  pull_request:

jobs:
  cppcheck-differential:
    runs-on: ubuntu-latest
    container: ros:jazzy

    steps:
      - name: Set PR fetch depth
        run: echo "PR_FETCH_DEPTH=$(( ${{ github.event.pull_request.commits }} + 1 ))" >> "${GITHUB_ENV}"

      - name: Checkout PR branch and all PR commits
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: ${{ env.PR_FETCH_DEPTH }}

      - name: Set git safe directory
        run: git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Install Cppcheck
        run: |
          apt-get update
          apt-get install -y cppcheck

      - name: Fetch the base branch with enough history for a common merge-base commit
        run: git fetch origin ${{ github.base_ref }}
        shell: bash

      - name: Get modified packages
        id: get-modified-packages
        uses: autowarefoundation/autoware-github-actions/get-modified-packages@v1

      - name: Get full paths of modified packages
        id: get-full-paths
        run: |
          modified_packages="${{ steps.get-modified-packages.outputs.modified-packages }}"
          paths=""
          for pkg in $modified_packages; do
            path=$(colcon list --packages-select $pkg | awk '{print $2}' | xargs realpath)
            paths="$paths $path"
          done
          echo "full-paths=$paths" >> $GITHUB_OUTPUT

      - name: Filter packages with no cpp/hpp files
        id: filter-paths-no-cpp-files
        run: |
          filtered_paths=""
          for dir in ${{ steps.get-full-paths.outputs.full-paths }}; do
            if [ -d "$dir" ] && find "$dir" -name "*.cpp" | grep -q .; then
              filtered_paths="$filtered_paths $dir"
            fi
          done
          echo "filtered-full-paths=$filtered_paths" >> $GITHUB_OUTPUT

      # cspell: ignore suppr Dslots DAUTOWARE
      - name: Run Cppcheck on modified packages
        if: ${{ steps.filter-paths-no-cpp-files.outputs.filtered-full-paths != '' }}
        continue-on-error: true
        id: cppcheck
        run: |
          echo "Running Cppcheck on modified packages: ${{ steps.filter-paths-no-cpp-files.outputs.filtered-full-paths }}"
          cppcheck --enable=all --inconclusive --check-level=exhaustive -D'PLUGINLIB_EXPORT_CLASS(class_type, base_class)=' -Dslots= -DQ_SLOTS= -D'AUTOWARE_MESSAGE_UNIQUE_PTR(MessageT)=std::unique_ptr<MessageT>' -D'AUTOWARE_MESSAGE_SHARED_PTR(MessageT)=std::shared_ptr<MessageT>' -D'AUTOWARE_MESSAGE_CONST_SHARED_PTR(MessageT)=std::shared_ptr<const MessageT>' -D'AUTOWARE_SUBSCRIPTION_PTR(MessageT)=rclcpp::Subscription<MessageT>::SharedPtr' -D'AUTOWARE_PUBLISHER_PTR(MessageT)=rclcpp::Publisher<MessageT>::SharedPtr' -D'AUTOWARE_POLLING_SUBSCRIBER_PTR(MessageT)=autoware_utils_rclcpp::InterProcessPollingSubscriber<MessageT>::SharedPtr' -DAUTOWARE_TIMER_PTR=rclcpp::TimerBase::SharedPtr -D'AUTOWARE_CREATE_SUBSCRIPTION(message_type, topic, qos, callback, options)=this->create_subscription<message_type>(topic, qos, callback, options)' -D'AUTOWARE_CREATE_PUBLISHER2(message_type, arg1, arg2)=this->create_publisher<message_type>(arg1, arg2)' -D'AUTOWARE_CREATE_PUBLISHER3(message_type, arg1, arg2, arg3)=this->create_publisher<message_type>(arg1, arg2, arg3)' -D'AUTOWARE_CREATE_POLLING_SUBSCRIBER(message_type, topic, qos)=autoware_utils_rclcpp::InterProcessPollingSubscriber<message_type>::create_subscription(this, topic, qos)' -DAUTOWARE_SUBSCRIPTION_OPTIONS=rclcpp::SubscriptionOptions -DAUTOWARE_PUBLISHER_OPTIONS=rclcpp::PublisherOptions -D'ALLOCATE_OUTPUT_MESSAGE_UNIQUE(publisher)=std::make_unique<std::remove_reference<decltype(*publisher)>::type::ROSMessageType>()' -D'ALLOCATE_OUTPUT_MESSAGE_SHARED(publisher)=std::make_shared<std::remove_reference<decltype(*publisher)>::type::ROSMessageType>()' --error-exitcode=1 --suppressions-list=.cppcheck_suppressions --inline-suppr ${{ steps.filter-paths-no-cpp-files.outputs.filtered-full-paths }} 2> cppcheck-report.txt
        shell: bash

      - name: Setup Problem Matchers for cppcheck
        if: ${{ steps.filter-paths-no-cpp-files.outputs.filtered-full-paths != '' }}
        run: echo "::add-matcher::.github/cppcheck-problem-matcher.json"

      - name: Show cppcheck-report result
        if: ${{ steps.filter-paths-no-cpp-files.outputs.filtered-full-paths != '' }}
        run: |
          cat cppcheck-report.txt

      - name: Upload Cppcheck report
        if: ${{ steps.filter-paths-no-cpp-files.outputs.filtered-full-paths != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck-report.txt

      - name: Fail the job if Cppcheck failed
        if: ${{ steps.filter-paths-no-cpp-files.outputs.filtered-full-paths != '' && steps.cppcheck.outcome == 'failure' }}
        run: exit 1

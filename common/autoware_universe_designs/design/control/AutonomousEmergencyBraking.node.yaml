autoware_system_design_format: 0.3.0

# node information
name: AutonomousEmergencyBraking.node

package:
  name: autoware_autonomous_emergency_braking
  provider: autoware

launch:
  plugin: autoware::motion::control::autonomous_emergency_braking::AEB
  executable: autoware_autonomous_emergency_braking

# interfaces
subscribers:
  - name: pointcloud
    message_type: sensor_msgs/msg/PointCloud2
  - name: velocity
    message_type: autoware_vehicle_msgs/msg/VelocityReport
  - name: imu
    message_type: sensor_msgs/msg/Imu
  - name: objects
    message_type: autoware_perception_msgs/msg/PredictedObjects
  - name: predicted_trajectory
    message_type: autoware_planning_msgs/msg/Trajectory
  - name: autoware/state
    message_type: autoware_system_msgs/msg/AutowareState

publishers:
  - name: debug_marker
    message_type: visualization_msgs/msg/MarkerArray
    remap_target: ~/debug/markers
  - name: virtual_wall
    message_type: visualization_msgs/msg/MarkerArray
    remap_target: ~/virtual_wall

# parameters
param_files:
  - name: aeb_param
    default: $(find-pkg-share autoware_autonomous_emergency_braking)/config/autonomous_emergency_braking.param.yaml

param_values: []

# processes
processes: []

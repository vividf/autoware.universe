autoware_system_design_format: 0.3.0

# node information
name: CollisionDetector.node

package:
  name: autoware_collision_detector
  provider: autoware

launch:
  plugin: autoware::collision_detector::CollisionDetectorNode
  executable: autoware_collision_detector_node

# interfaces
subscribers:
  - name: odometry
    message_type: nav_msgs/msg/Odometry
  - name: pointcloud
    message_type: sensor_msgs/msg/PointCloud2
  - name: objects
    message_type: autoware_perception_msgs/msg/PredictedObjects
  - name: operation_mode_state
    message_type: autoware_adapi_v1_msgs/msg/OperationModeState
    global: /api/operation_mode/state

publishers: []

# parameters
param_files:
  - name: collision_detector_param
    default: $(find-pkg-share autoware_collision_detector)/config/collision_detector.param.yaml

param_values: []

# processes
processes:
  - name: detect_collision
    trigger_conditions:
      - on_input: pointcloud
    outcomes:
      - terminal: null

autoware_system_design_format: 0.3.0

# node information
name: RemainingDistanceTimeCalculator.node

package:
  name: autoware_remaining_distance_time_calculator
  provider: autoware

launch:
  plugin: autoware::remaining_distance_time_calculator::RemainingDistanceTimeCalculatorNode
  executable: autoware_remaining_distance_time_calculator_node

# interfaces
subscribers:
  - name: odometry
    message_type: nav_msgs/msg/Odometry
  - name: map
    message_type: autoware_map_msgs/msg/LaneletMapBin
  - name: route
    message_type: autoware_planning_msgs/msg/LaneletRoute
  - name: scenario
    message_type: autoware_internal_planning_msgs/msg/Scenario
  - name: planning_velocity
    message_type: autoware_internal_planning_msgs/msg/VelocityLimit
    global: /planning/scenario_planning/current_max_velocity

publishers:
  - name: mission_remaining_distance_time
    message_type: autoware_internal_msgs/msg/MissionRemainingDistanceTime

# parameters
param_files:
  - name: remaining_distance_time_calculator
    default: config/remaining_distance_time_calculator.param.yaml

param_values: []

# processes
processes:
  - name: calculate_metrics
    trigger_conditions:
      - on_input: odometry
    outcomes:
      - to_output: mission_remaining_distance_time

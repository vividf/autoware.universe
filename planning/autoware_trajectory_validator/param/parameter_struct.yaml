validator:
  filter_names:
    type: string_array
    default_value: [""]
    description: metrics.
    read_only: true

  shadow_mode_filter_names:
    type: string_array
    default_value: [""]
    description: List of filter names that run in which results are logged but do not affect trajectory feasibility.
    read_only: false

  vehicle_constraint:
    max_speed:
      type: double
      default_value: 16.7
      description: Maximum allowed speed (m/s)
      read_only: false
    max_acceleration:
      type: double
      default_value: 5.0
      description: Maximum allowed acceleration (m/s^2)
      read_only: false
    max_deceleration:
      type: double
      default_value: 5.0
      description: Maximum allowed deceleration (m/s^2, positive but represents deceleration)
      read_only: false
    max_steering_angle:
      type: double
      default_value: 0.8
      description: Maximum allowed steering angle (rad)
      read_only: false
    max_steering_rate:
      type: double
      default_value: 0.3
      description: Maximum allowed steering rate (rad/s)
      read_only: false

  traffic_light:
    deceleration_limit:
      type: double
      default_value: 2.8
      description: trajectories crossing an amber light are rejected if ego can stop at the stop line without breaking this limit
      read_only: false
    jerk_limit:
      type: double
      default_value: 5.0
      description: trajectories crossing an amber light are rejected if ego can stop at the stop line without breaking this limit
      read_only: false
    delay_response_time:
      type: double
      default_value: 0.5
      description: delay response time used to estimate the minimum ego stopping distance
      read_only: false
    crossing_time_limit:
      type: double
      default_value: 2.75
      description: trajectories crossing an amber light are rejected if they cannot cross before this time
      read_only: false
    treat_amber_light_as_red_light:
      type: bool
      default_value: true
      description: when true, amber lights are handled like red lights
      read_only: false
    stop_overshoot_margin:
      type: double
      default_value: 0.5
      description: Maximum distance between the stop line and the trajectory stop point to consider the trajectory feasible (m)
      read_only: false
    checked_trajectory_length:
      deceleration_limit:
        type: double
        default_value: 2.0
        description: deceleration limit to calculate the stop distance used as trajectory length limit
        read_only: false
      jerk_limit:
        type: double
        default_value: 2.0
        description: jerk limit to calculate the stop distance used as trajectory length limit
        read_only: false

  boundary_departure:
    lateral_margin_m:
      type: double
      default_value: 0.01
      description: lateral margin [m]
      read_only: false
    longitudinal_margin_m:
      type: double
      default_value: 1.0
      description: longitudinal margin [m]
      read_only: false
    max_deceleration_mps2:
      type: double
      default_value: -4.0
      description: maximum deceleration [m/s^2]
      read_only: false
    max_jerk_mps3:
      type: double
      default_value: -5.0
      description: maximum jerk [m/s^3]
      read_only: false
    brake_delay_s:
      type: double
      default_value: 1.0
      description: brake delay [s]
      read_only: false
    time_to_departure_cutoff_s:
      type: double
      default_value: 2.0
      description: time to departure cutoff [s]
      read_only: false
    on_time_buffer_s:
      type: double
      default_value: 0.15
      description: buffer for activating departure detection [s]
      read_only: false
    off_time_buffer_s:
      type: double
      default_value: 0.15
      description: buffer for deactivating departure detection [s]
      read_only: false
    enable_developer_marker:
      type: bool
      default_value: true
      description: flag marker only for developer
      read_only: false
    boundary_types:
      type: string_array
      default_value: [road_border]
      description: boundary types to detect
      read_only: true
